source: appleby-relentless-revolution
units:
- nn: 1
  unit_id: ch01-puzzle-of-capitalism
  note_id: appleby-relentless-revolution-ch01-puzzle-of-capitalism
  span: 4261:59696
  chunks:
  - id: appleby-relentless-revolution#u01-c1
    heading: The Puzzle Is Delay, Not Triumph
    span: 4261:5604
    why: States the book's central question outright — not why capitalism triumphed, but why it took millennia
      to arrive — and names the two-part mechanism (natural philosophy plus practical invention) Appleby
      credits for finally breaking the deadlock.
  - id: appleby-relentless-revolution#u01-c2
    heading: Scarcity as the Bedrock of Traditional Society
    span: 8340:9247
    why: Establishes the scarcity-and-authority baseline every traditional society shared, the backdrop
      against which capitalism's later departure becomes visible as a departure at all.
  - id: appleby-relentless-revolution#u01-c3
    heading: 'Breaking the Dike: Contingency, Not a Chain'
    span: 13912:14570
    why: 'Gives Appleby''s governing historiographical claim in miniature: capitalism was not a chain
      of small causes but an irreversible rupture requiring many contingent, converging factors — her
      explicit alternative to single-cause narratives.'
  - id: appleby-relentless-revolution#u01-c4
    heading: Weber Against the Natural Money-Seeker
    span: 37300:38431
    why: Appleby's fullest engagement with Weber, whose insistence that no natural profit-seeking psychology
      preceded capitalism, and whose tracing of 'the spirit of capitalism' to Protestant anxiety about
      salvation, most shapes her own account.
  - id: appleby-relentless-revolution#u01-c5
    heading: Capitalism as a Cultural System
    span: 57768:58796
    why: Appleby's own working definition of capitalism, given at the close of the introduction, as a
      cultural system before it is an economic one — the thesis the rest of the book is built to defend.
- nn: 2
  unit_id: ch02-trading-in-new-directions
  note_id: appleby-relentless-revolution-ch02-trading-in-new-directions
  span: 59696:126842
  chunks:
  - id: appleby-relentless-revolution#u02-c1
    heading: Aristocratic Contempt for Commerce
    span: 70501:71107
    why: States Appleby's account of why the noble ethos of leisure and rent-seeking actively blocked
      reinvestment in the very societies most enriched by trade.
  - id: appleby-relentless-revolution#u02-c2
    heading: Trade Is Not Capitalism
    span: 72859:73356
    why: Appleby's central methodological claim, opening the chapter's argument that expanding trade routes
      must not be conflated with the actual causes of capitalism.
  - id: appleby-relentless-revolution#u02-c3
    heading: King James's Monopoly Economy
    span: 90761:91190
    why: The vivid 'monopoly bricks' anecdote shows how the English crown extracted revenue from commerce
      through royal grants, the practice whose erosion during the Civil War cleared space for freer trade.
  - id: appleby-relentless-revolution#u02-c4
    heading: Raleigh on Commanding the Sea
    span: 87389:87631
    why: Raleigh's maxim crystallizes the era's operating logic — naval dominance, trade dominance, and
      geopolitical power as one chain — driving Dutch, English, and French rivalry with Iberia.
  - id: appleby-relentless-revolution#u02-c5
    heading: 'The Dutch Puzzle: Provisioning Mentality'
    span: 121975:122872
    why: Appleby's explanation for why the Dutch Republic, despite superior commercial and financial institutions,
      stalled short of industrialization — the chapter's key comparative payoff.
  - id: appleby-relentless-revolution#u02-c6
    heading: Breaking the Trade-Capitalism Connection
    span: 122874:123274
    why: Appleby's closing restatement of the chapter's thesis, explicitly naming 'commercial capitalism'
      as a misleading label for what actually happened.
- nn: 3
  unit_id: ch03a-basket-of-consumables-and-population
  note_id: appleby-relentless-revolution-ch03a-basket-of-consumables-and-population
  span: 126842:166238
  chunks:
  - id: appleby-relentless-revolution#u03-c1
    heading: 'Engrossing, forestalling, and regrating: grain as a social good'
    span: 128882:129413
    why: Shows the legal-regulatory apparatus fear of famine built around grain, treating the food supply
      as a governed social good rather than an ordinary market commodity.
  - id: appleby-relentless-revolution#u03-c2
    heading: The potato's promise and the Irish famine
    span: 140883:141699
    why: 'Illustrates the double-edged nature of New World food dependence: the same crop that eased scarcity
      and grew population became a catastrophic single point of failure.'
  - id: appleby-relentless-revolution#u03-c3
    heading: Sugar's West Indies monopoly
    span: 143049:143690
    why: Appleby's own oil analogy for sugar captures how a single New World commodity reorganized both
      Caribbean production and European consumption for two centuries.
  - id: appleby-relentless-revolution#u03-c4
    heading: Malthus's catch-22 in his own words
    span: 151677:152219
    why: The formal statement of the exponential-population-versus-arithmetic-food problem that structures
      the whole unit's account of premodern scarcity.
  - id: appleby-relentless-revolution#u03-c5
    heading: Late marriage as Europe's population check
    span: 156686:157400
    why: The empirical demographic finding, reconstructed from parish registers, that Europe alone restrained
      fertility through custom rather than famine—the counterweight to Malthus's pessimism.
  - id: appleby-relentless-revolution#u03-c6
    heading: Why food costs choked off every other enterprise
    span: 159563:160560
    why: 'States the unit''s underlying thesis directly: the sheer labor cost of feeding society structurally
      foreclosed capital and workers for manufacturing or trade until agriculture changed.'
- nn: 4
  unit_id: ch03b-dutch-and-english-farming-improvements
  note_id: appleby-relentless-revolution-ch03b-dutch-and-english-farming-improvements
  span: 166238:199871
  chunks:
  - id: appleby-relentless-revolution#u04-c1
    heading: The Four-Field Rotation Breakthrough
    span: 168154:168890
    why: Names the exact agronomic mechanism, nitrogen-fixing clover replacing fallow fields, and frames
      it as the historic break from a millennia-old economy of scarcity.
  - id: appleby-relentless-revolution#u04-c2
    heading: Reversing the Marxist Causal Story
    span: 178911:179605
    why: 'States Appleby''s central historiographical claim against Marxist accounts: that market social
      relations followed from agricultural change rather than causing it.'
  - id: appleby-relentless-revolution#u04-c3
    heading: The Enclosure Pamphlet War
    span: 187431:188357
    why: Captures the period's own ideological debate over enclosure, including Lee's direct defense of
      private over communal farming in his own words.
  - id: appleby-relentless-revolution#u04-c4
    heading: Crossing the Famine Barrier
    span: 191116:191864
    why: Marks the precise historical threshold Appleby identifies, England's escape from famine, as the
      vulnerability underwriting the old social order quietly disappearing.
  - id: appleby-relentless-revolution#u04-c5
    heading: A Farmer's Lament for the Local Market
    span: 192694:193078
    why: A contemporary's own voice registers what national market integration cost in lived experience,
      complicating any triumphalist reading of the transition.
- nn: 5
  unit_id: ch04a-market-discourse-and-usury
  note_id: appleby-relentless-revolution-ch04a-market-discourse-and-usury
  span: 199871:247847
  chunks:
  - id: appleby-relentless-revolution#u05-c1
    heading: The Calico Craze and the "Wants of the Mind"
    span: 200250:200506
    why: Ordinary consumers embracing new fabrics, not elite theorists, first demonstrated capitalism's
      premise that wanting more makes people work harder.
  - id: appleby-relentless-revolution#u05-c2
    heading: Clothiers, Layoffs, and the Limits of Paternalism
    span: 218336:218880
    why: Grounds the abstract employer-responsibility debate in the concrete 1620s controversy that first
      forced the question of whether market logic could override the paternalist duty to protect workers.
  - id: appleby-relentless-revolution#u05-c3
    heading: Thomas Mun's "Necessity Beyond All Resistance"
    span: 220783:221141
    why: 'Mun''s declaration is the pivotal theoretical move: recasting the economy as an impersonal system
      governed by its own laws rather than by princely will or moral censure.'
  - id: appleby-relentless-revolution#u05-c4
    heading: The Deuteronomic Ban on Usury
    span: 225344:225751
    why: States the biblical prohibition that made lending at interest illegitimate for over a millennium,
      and the moral code distinguishing brother from stranger that the rest of the unit traces being hollowed
      out.
  - id: appleby-relentless-revolution#u05-c5
    heading: The Dutch as Economic Anti-Fairy-Tale
    span: 229814:230472
    why: Contrasts the Dutch's mundane commercial success against the treasure-conquest fantasies of Spain
      and Portugal, the puzzle that pushed English writers toward abstract economic modeling.
  - id: appleby-relentless-revolution#u05-c6
    heading: Economic Man Replaces the Impulsive Sinner
    span: 234684:235254
    why: 'Names the discourse''s cumulative payoff: a new, durable model of human nature as self-interested
      and rational that displaced the older picture of impulsive, sin-prone humanity and underwrote Smith''s
      later system.'
- nn: 6
  unit_id: ch04b-currency-crisis-and-new-economic-thinking
  note_id: appleby-relentless-revolution-ch04b-currency-crisis-and-new-economic-thinking
  span: 247847:278655
  chunks:
  - id: appleby-relentless-revolution#u06-c1
    heading: Locke's Intrinsic-Value Fallacy
    span: 251768:252274
    why: States Locke's mistaken but politically victorious theory that coin has only intrinsic silver
      value, tying it to Appleby's judgment that he was wrong yet decisive.
  - id: appleby-relentless-revolution#u06-c2
    heading: A Pamphleteer's Class Critique of Locke
    span: 255009:255331
    why: A contemporary explicitly names the class interests (landlords and creditors versus tenants and
      debtors) embedded in Locke's supposedly neutral monetary theory.
  - id: appleby-relentless-revolution#u06-c3
    heading: The Recoinage's Deflationary Aftermath
    span: 255643:256302
    why: 'Delivers the outcome and stakes of the debate: Parliament followed the weaker argument, and
      the resulting deflation fell hardest on the poor.'
  - id: appleby-relentless-revolution#u06-c4
    heading: John Law and the Mississippi Bubble
    span: 258380:259170
    why: Introduces the origin of the term 'bubble' and the French cautionary case against which England's
      more durable financial institutions are implicitly measured.
  - id: appleby-relentless-revolution#u06-c5
    heading: Physiocracy as Command Imitation of English Growth
    span: 266345:267219
    why: 'States Appleby''s central comparative claim: French physiocrats tried to legislate from above
      what English entrepreneurs achieved through decentralized, self-interested experimentation.'
  - id: appleby-relentless-revolution#u06-c6
    heading: Capitalism Was Not Inevitable
    span: 276247:276680
    why: Appleby's explicit methodological thesis warning against teleological narratives of capitalism's
      rise, the interpretive frame for the whole unit.
- nn: 7
  unit_id: ch05a-slavery-labor-and-industrial-inventions
  note_id: appleby-relentless-revolution-ch05a-slavery-labor-and-industrial-inventions
  span: 278655:325410
  chunks:
  - id: appleby-relentless-revolution#u07-c1
    heading: Twin responses to the capitalist genie
    span: 281036:281887
    why: States the unit's organizing thesis that slave plantations and mechanical invention were parallel,
      radical departures from tradition produced by the same capitalist logic.
  - id: appleby-relentless-revolution#u07-c2
    heading: The scale of the Atlantic slave trade
    span: 285144:285635
    why: Grounds the unit's moral argument in precise demographic figures for the trade's total scale
      and national breakdown.
  - id: appleby-relentless-revolution#u07-c3
    heading: Circular reasoning and the invention of race
    span: 309563:310251
    why: Appleby's key analytical claim that racial prejudice was manufactured after the fact to rationalize
      slavery rather than causing it.
  - id: appleby-relentless-revolution#u07-c4
    heading: Why 'Industrial Evolution' fits better than 'Revolution'
    span: 317388:318153
    why: Appleby's explicit historiographical argument that mechanization was a slow, evolutionary accretion
      rather than a sudden rupture.
  - id: appleby-relentless-revolution#u07-c5
    heading: High wages and cheap coal made machines rational
    span: 324837:325406
    why: States the unit's specific causal argument for why mechanized industry emerged in England rather
      than elsewhere.
- nn: 8
  unit_id: ch05b-science-enlightenment-and-technology-culture
  note_id: appleby-relentless-revolution-ch05b-science-enlightenment-and-technology-culture
  span: 325410:377294
  chunks:
  - id: appleby-relentless-revolution#u08-c1
    heading: Bacon's empiricism and the culture of open publication
    span: 326979:327920
    why: States the epistemic shift — testable hypotheses, openly published rather than secretly guarded
      — that the whole unit's chain of invention depends on.
  - id: appleby-relentless-revolution#u08-c2
    heading: 'Watt''s condenser: science engineered into a machine'
    span: 338521:339275
    why: The unit's clearest single image of scientific principle (atmospheric pressure) becoming a specific
      mechanical invention.
  - id: appleby-relentless-revolution#u08-c3
    heading: The Luddites declare war on the machines
    span: 352555:352931
    why: Names and grounds the organized worker resistance that runs through the second half of the unit
      as a counterweight to invention's triumphalism.
  - id: appleby-relentless-revolution#u08-c4
    heading: Smith on the universal drive to better one's condition
    span: 364027:364864
    why: Smith's foundational psychological premise for Wealth of Nations, quoted directly, and the unit's
      strongest resonance with the conatus concept.
  - id: appleby-relentless-revolution#u08-c5
    heading: Industrial progress and Atlantic slavery diverge
    span: 372706:373582
    why: Explicitly connects this unit to the book's larger argument about capitalism's slave-economy
      roots and marks where industrial and slave economies diverged in visibility and conscience.
  - id: appleby-relentless-revolution#u08-c6
    heading: Wedgwood disciplines his workforce with bells and clocks
    span: 344074:344675
    why: Shows factory discipline itself as an invention — punctuality, record-keeping, and monitoring
      as technologies of labor control, not just the machinery.
- nn: 9
  unit_id: ch06a-german-and-american-industrialization
  note_id: appleby-relentless-revolution-ch06a-german-and-american-industrialization
  span: 377294:422190
  chunks:
  - id: appleby-relentless-revolution#u09-c1
    heading: 'The chapter''s thesis: overtaking Britain by closing the national economy'
    span: 378796:379459
    why: States the unit's central claim — that Germany and the US overtook Britain precisely by rejecting
      free trade for Weber's "closed national state," inverting the era's economic orthodoxy.
  - id: appleby-relentless-revolution#u09-c2
    heading: Industrial espionage as the mechanism of catch-up
    span: 381047:381904
    why: Documents how catch-up industrialization actually worked — organized technology transfer via
      spies, smuggled machines, and emigrant artisans, not autonomous invention.
  - id: appleby-relentless-revolution#u09-c3
    heading: The invention of "progress" as a historical category
    span: 385195:385521
    why: Marks the moment "progress" shifted from literal movement to a value-laden temporal ideology
      underwriting industrial capitalism's legitimacy.
  - id: appleby-relentless-revolution#u09-c4
    heading: Bismarck's "iron and blood" unification
    span: 400777:401431
    why: Shows German unification and industrial ascent as a deliberate Bismarckian military-political
      project rather than a spontaneous economic process.
  - id: appleby-relentless-revolution#u09-c5
    heading: Tocqueville on the American sailor's temperament
    span: 418135:418991
    why: A contemporary eyewitness account, quoted at length, locating American commercial success in
      temperament and risk tolerance rather than material cost advantages.
  - id: appleby-relentless-revolution#u09-c6
    heading: Slavery's measurable wealth against its immeasurable cost
    span: 405367:405707
    why: Appleby's own interpretive judgment weighing slavery's economic productivity against the South's
      long-run loss of cultural capital and moral standing — a key analytical claim of the unit.
- nn: 10
  unit_id: ch06b-banks-incorporation-and-the-1873-depression
  note_id: appleby-relentless-revolution-ch06b-banks-incorporation-and-the-1873-depression
  span: 422190:463981
  chunks:
  - id: appleby-relentless-revolution#u10-c1
    heading: Creative destruction and early obsolescence
    span: 424886:425369
    why: States Schumpeter's core concept of capitalism verbatim and explains why it captures both creation
      and destruction, the interpretive key to the unit's technology section.
  - id: appleby-relentless-revolution#u10-c2
    heading: Banks as catalysts, not initiators
    span: 432678:433306
    why: 'Defines the specific, limited function banks played in industrialization: channeling savings
      into investment rather than originating ventures themselves.'
  - id: appleby-relentless-revolution#u10-c3
    heading: Incorporation as an artificial person
    span: 443992:444676
    why: Gives the unit's clearest definition of limited-liability incorporation, the legal technology
      that let capital outlive its founders.
  - id: appleby-relentless-revolution#u10-c4
    heading: Dispersed decision-making and the 1873 crisis
    span: 450792:451215
    why: 'Articulates capitalism''s epistemological opacity: prices carry information nobody centrally
      interprets until a crisis forces the question.'
  - id: appleby-relentless-revolution#u10-c5
    heading: The gold standard as invisible taskmaster
    span: 453688:454030
    why: Appleby's most vivid image for how a fixed-exchange regime disciplined wages and trade without
      any single visible authority.
  - id: appleby-relentless-revolution#u10-c6
    heading: Bryan's cross of gold
    span: 455173:455524
    why: Captures the populist backlash against the gold standard's deflationary bite, personified in
      Bryan's famous 1896 convention line.
- nn: 11
  unit_id: ch07-industrial-leviathans-and-their-opponents
  note_id: appleby-relentless-revolution-ch07-industrial-leviathans-and-their-opponents
  span: 463981:527495
  chunks:
  - id: appleby-relentless-revolution#u11-c1
    heading: Vanderbilt imposes order on railroad chaos
    span: 467863:468292
    why: Shows Vanderbilt's central achievement as literally making a chaotic, illegible system readable
      and governable at scale.
  - id: appleby-relentless-revolution#u11-c2
    heading: German institutional capitalism vs. American individualism
    span: 466830:467130
    why: States the chapter's explicit comparative thesis about divergent national styles of industrial
      capitalism.
  - id: appleby-relentless-revolution#u11-c3
    heading: The largest migration in history
    span: 488297:489035
    why: 'Quantifies the demographic engine of industrialization: the scale and composition of the labor
      supply feeding American factories.'
  - id: appleby-relentless-revolution#u11-c4
    heading: 'Proudhon: “Property is theft”'
    span: 493073:493461
    why: The chapter's clearest statement of anarchist ideology, the load-bearing slogan behind labor's
      opposition to industrial capitalism.
  - id: appleby-relentless-revolution#u11-c5
    heading: Department stores as capitalism's new battlefield
    span: 515478:516427
    why: Marks the chapter's pivot from producer to consumer capitalism, naming the mass-retail “creative
      destruction” of small shops.
  - id: appleby-relentless-revolution#u11-c6
    heading: Gompers's “more” campaign
    span: 524305:524625
    why: Gompers's own words capture the demand-side insight — labor as customer, not just producer —
      that resolves the chapter's central economic puzzle.
- nn: 12
  unit_id: ch08a-european-imperialism-in-africa-and-asia
  note_id: appleby-relentless-revolution-ch08a-european-imperialism-in-africa-and-asia
  span: 527495:573386
  chunks:
  - id: appleby-relentless-revolution#u12-c1
    heading: Governments as Venture Capitalists
    span: 528407:529413
    why: States the unit's core thesis that European governments, flush with accumulated capital, turned
      to empire-building as an extension of capitalism itself rather than a break from it.
  - id: appleby-relentless-revolution#u12-c2
    heading: The Congo Free State's Forced-Labor Regime
    span: 541457:542016
    why: Documents the mechanics of Leopold's Congo Free State, the unit's central case study in colonial
      atrocity carried out in the name of humanitarianism.
  - id: appleby-relentless-revolution#u12-c3
    heading: Livingstone and Stanley as Twin Faces of Venture Capital
    span: 554845:555665
    why: Locates the moral contrast between humanitarian and predatory imperialism inside a shared entrepreneurial
      psychology, Appleby's key interpretive move.
  - id: appleby-relentless-revolution#u12-c4
    heading: Arendt on Imperial Hypocrisy
    span: 557307:558087
    why: Supplies the unit's sharpest statement of the double standard by which Europeans tolerated abroad
      what was intolerable at home.
  - id: appleby-relentless-revolution#u12-c5
    heading: Japan's Selective Modernization
    span: 570421:571250
    why: Shows Meiji Japan adopting Western capitalist and military tools while refusing Western economic
      ideology and colonial subjugation, the unit's counter-model to the African scramble.
- nn: 13
  unit_id: ch08b-corporate-restructuring-and-american-industry
  note_id: appleby-relentless-revolution-ch08b-corporate-restructuring-and-american-industry
  span: 573386:612532
  chunks:
  - id: appleby-relentless-revolution#u13-c1
    heading: Bureaucracy defines the modern firm
    span: 576290:576775
    why: 'States the chapter''s core structural claim: the corporation''s novelty was managerial bureaucracy
      and the separation of ownership from management, not merely scale.'
  - id: appleby-relentless-revolution#u13-c2
    heading: 'Cartels versus common law: the US/Germany divergence'
    span: 585980:586705
    why: Explains why Germany's cartels and America's merger-driven trusts were legally distinct solutions
      to the same competitive pressure, and why FDR's NRA was struck down while German cartels stood.
  - id: appleby-relentless-revolution#u13-c3
    heading: Germany's science-industry "secret marriage"
    span: 590985:591659
    why: Names the distinctive German mechanism—state-funded technical education fused to private industry—that
      produced its dominance in chemicals and dyestuffs.
  - id: appleby-relentless-revolution#u13-c4
    heading: Ford invents mass production
    span: 597531:597921
    why: The precise moment Appleby credits Ford with inventing mass production by reorganizing labor
      into simple, repetitive tasks on a moving line.
  - id: appleby-relentless-revolution#u13-c5
    heading: The automobile loosens social surveillance
    span: 602455:603268
    why: Shows the automobile's effects reaching past economics into social mores, extending mobility
      beyond the watchful eyes of parents, bosses, and police.
  - id: appleby-relentless-revolution#u13-c6
    heading: Against an inevitable American ascendancy
    span: 608523:609194
    why: Appleby's explicit thesis statement rejecting a deterministic or inexorable-logic reading of
      American industrial dominance in favor of contingent political and social causes.
- nn: 14
  unit_id: ch09-war-and-depression
  note_id: appleby-relentless-revolution-ch09-war-and-depression
  span: 612532:664463
  chunks:
  - id: appleby-relentless-revolution#u14-c1
    heading: War as overdetermined miscalculation
    span: 614079:614378
    why: States the chapter's opening thesis that WWI had no real causes, only an accumulation of alliance-driven
      imprudence and miscalculation.
  - id: appleby-relentless-revolution#u14-c2
    heading: The betrayal of self-determination
    span: 620813:621203
    why: Names the postwar betrayal of Wilsonian self-determination as the root of decades of anti-Western
      resentment across the colonized world.
  - id: appleby-relentless-revolution#u14-c3
    heading: The puzzle of the non-rebound
    span: 632164:632563
    why: Frames the Depression's defining mystery as the absence of a normal cyclical rebound, the analytical
      hook for the rest of the section.
  - id: appleby-relentless-revolution#u14-c4
    heading: Keynes and the pump-priming heresy
    span: 641986:642314
    why: Marks Keynes's entrance as the theoretical break that authorized deficit-spending government
      response, setting up the New Deal discussion.
  - id: appleby-relentless-revolution#u14-c5
    heading: Capitalism as juggernaut
    span: 662111:662579
    why: 'The chapter''s closing image and implicit thesis statement: capitalism as a powerful but directionless
      force capable of destroying its own adherents.'
  - id: appleby-relentless-revolution#u14-c6
    heading: Total war, command economies
    span: 657854:658400
    why: Shows wartime mobilization collapsing the capitalist/communist distinction the chapter otherwise
      relies on, with Soviet and American planning both outperforming Germany's.
- nn: 15
  unit_id: ch10a-marshall-plan-and-postwar-consumer-economy
  note_id: appleby-relentless-revolution-ch10a-marshall-plan-and-postwar-consumer-economy
  span: 664463:713315
  chunks:
  - id: appleby-relentless-revolution#u15-c1
    heading: Three Paths to Postwar Reconstruction
    span: 666392:666951
    why: States Appleby's own analytical framework—indicative, imperative, informative—that organizes
      the entire chapter's account of how different postwar economies chose to coordinate recovery.
  - id: appleby-relentless-revolution#u15-c2
    heading: The Marshall Plan Announced
    span: 675746:676062
    why: Names the Marshall Plan's origin and its concrete mechanics in Appleby's own words, the pivot
      point the whole European recovery narrative turns on.
  - id: appleby-relentless-revolution#u15-c3
    heading: Integration Came From Individuals, Not Economic Laws
    span: 684667:685143
    why: Appleby's explicit thesis that European integration, unlike ordinary market behavior, was willed
      into being by particular individuals rather than following from any law of capitalism.
  - id: appleby-relentless-revolution#u15-c4
    heading: Credit Becomes a Pillar of Prosperity
    span: 705936:706781
    why: Marks the institutional shift—scattered department-store charge accounts becoming a coordinated
      national credit system—that made mass installment buying, not just rising wages, the engine of American
      consumerism.
  - id: appleby-relentless-revolution#u15-c5
    heading: Commerce Reshapes American Politics
    span: 710172:710509
    why: Closes the technology section with Appleby's recurring argument that commerce reshapes institutions—here,
      campaign finance—in ways nobody planned for.
- nn: 16
  unit_id: ch10b-cold-war-science-computers-and-labor
  note_id: appleby-relentless-revolution-ch10b-cold-war-science-computers-and-labor
  span: 713315:764722
  chunks:
  - id: appleby-relentless-revolution#u16-c1
    heading: Sputnik as the catalyst for mass higher education
    span: 713354:714299
    why: 'Establishes the unit''s founding claim: a Soviet PR victory, not a domestic breakthrough, is
      what drove America''s postwar expansion of universities.'
  - id: appleby-relentless-revolution#u16-c2
    heading: Operation Paperclip and the import of German rocket scientists
    span: 721065:722343
    why: Shows the morally compromised bureaucratic compromise (Nazi-affiliated scientists screened for
      U.S. usefulness) underneath the American space program's origins.
  - id: appleby-relentless-revolution#u16-c3
    heading: Eisenhower's warning about the military-industrial complex
    span: 725611:726326
    why: The chapter's most direct primary-source statement of the risk that Cold War R&D spending could
      let a technological elite capture public policy.
  - id: appleby-relentless-revolution#u16-c4
    heading: IBM's punch card and the Nazi census
    span: 734002:734789
    why: The unit's starkest illustration of data-legibility technology's dual use, from Watson's commercial
      ambition to the darkest client of the same product.
  - id: appleby-relentless-revolution#u16-c5
    heading: The arc of organized labor's postwar decline
    span: 744708:745448
    why: A compact, load-bearing summary of the institutional forces (Taft-Hartley, capital flight, failed
      legislation) that eroded union membership from its postwar peak.
  - id: appleby-relentless-revolution#u16-c6
    heading: 1973 and the end of capitalism's golden age
    span: 762962:763750
    why: The unit's own verdict naming 1973 as the close of the postwar 'golden age,' the pivot point
      the whole chapter has been building toward.
- nn: 17
  unit_id: ch11a-japan-and-the-rise-of-personal-computing
  note_id: appleby-relentless-revolution-ch11a-japan-and-the-rise-of-personal-computing
  span: 764722:798338
  chunks:
  - id: appleby-relentless-revolution#u17-c1
    heading: The Keynesian consensus comes apart
    span: 764988:765821
    why: States the unit's opening diagnosis that 1970s stagflation was a crisis for Keynesian theory
      itself, not merely a run of bad luck.
  - id: appleby-relentless-revolution#u17-c2
    heading: Friedman's monetarism wins politically but fails practically
    span: 767009:768115
    why: Shows monetarism's political triumph under Thatcher and Reagan alongside its practical failure
      to prevent recession, the interregnum between economic paradigms.
  - id: appleby-relentless-revolution#u17-c3
    heading: The savings and loan crisis as deregulation's cost
    span: 770192:770654
    why: Quantifies deregulation's real cost (over seven hundred failed S&Ls, $100 billion to taxpayers)
      without it slowing the broader deregulatory movement.
  - id: appleby-relentless-revolution#u17-c4
    heading: Capitalism as perpetual reinvention
    span: 771674:772523
    why: The thesis statement that pivots the unit from the deregulation narrative into the Japan and
      personal-computer case studies of capitalism's adaptability.
  - id: appleby-relentless-revolution#u17-c5
    heading: The Toyoda loom and the cost of resisting disruption
    span: 777114:777582
    why: A concrete case study of British organized labor blocking a superior technology, ceding textile-machinery
      market share to Japan.
  - id: appleby-relentless-revolution#u17-c6
    heading: IBM bets on an open architecture
    span: 793576:793947
    why: The single decision the unit credits with creating the PC industry's rapid growth and with handing
      Intel and Microsoft their era-defining franchises.
- nn: 18
  unit_id: ch11b-internet-asian-tigers-and-walmart
  note_id: appleby-relentless-revolution-ch11b-internet-asian-tigers-and-walmart
  span: 798338:842679
  chunks:
  - id: appleby-relentless-revolution#u18-c1
    heading: ARPANET's drift from military project to commercial internet
    span: 798733:799184
    why: 'Establishes the unit''s core irony: a Cold War legibility project (DoD linking minicomputers)
      became, unplanned, capitalism''s biggest commercial success.'
  - id: appleby-relentless-revolution#u18-c2
    heading: The Four Tigers overturn dependency theory
    span: 813656:814222
    why: 'States the unit''s central economic-historical thesis: state-led land reform and export promotion
      refuted dependency theory''s claim that Third World underdevelopment was permanent.'
  - id: appleby-relentless-revolution#u18-c3
    heading: Walmart's real-time inventory legibility
    span: 827115:827555
    why: Concrete image of Walmart as an information-tracking machine, a commercial-scale instance of
      legibility as competitive advantage.
  - id: appleby-relentless-revolution#u18-c4
    heading: The Asian financial crisis and the necessity of bankruptcy
    span: 824926:825502
    why: The unit's most memorable formulation of capitalism's need for a failure mechanism, drawn from
      the 1997 Asian financial crisis.
  - id: appleby-relentless-revolution#u18-c5
    heading: Walmart versus the unionized automakers
    span: 831320:831625
    why: 'Names the generational shift the chapter is building toward: Walmart''s low-wage model replacing,
      rather than reproducing, the mid-century union bargain.'
  - id: appleby-relentless-revolution#u18-c6
    heading: Democracy means a full cupboard
    span: 840161:840413
    why: Closes the unit's ambivalence about capitalism and democracy with a vivid, quotable anecdote
      rather than an abstract claim.
- nn: 19
  unit_id: ch12a-wto-and-chinas-economic-transformation
  note_id: appleby-relentless-revolution-ch12a-wto-and-chinas-economic-transformation
  span: 842679:887737
  chunks:
  - id: appleby-relentless-revolution#u19-c1
    heading: The relentless revolution sweeps up China and India
    span: 844360:844861
    why: 'States the unit''s thesis in the book''s own title terms: China and India''s state-guided market
      reforms have undermined dependency theory and the assumed link between democracy and free enterprise.'
  - id: appleby-relentless-revolution#u19-c2
    heading: Doha's collapse as déjà vu of the 1920s
    span: 847236:847748
    why: Frames the WTO's 2008 crisis as a historical echo of interwar tariff nationalism, the unit's
      central argument about the fragility of multilateral trade consensus.
  - id: appleby-relentless-revolution#u19-c3
    heading: The bird cage economy doctrine
    span: 874601:874916
    why: The unit's governing metaphor for how the Communist Party manages market liberalization without
      relinquishing control, load-bearing for its whole account of gradualist reform.
  - id: appleby-relentless-revolution#u19-c4
    heading: The June Fourth Incident in Tiananmen Square
    span: 859414:859897
    why: The unit's account of the defining rupture for the generation coming of age in 1989, central
      to its generational framework for modern Chinese history.
  - id: appleby-relentless-revolution#u19-c5
    heading: Crossing the river by groping the stones
    span: 883784:884268
    why: Captures the unit's closing argument that China's economic transformation remains an incomplete,
      party-supervised passage rather than a finished transition to market rule.
- nn: 20
  unit_id: ch12b-eastern-europe-and-indias-transformation
  note_id: appleby-relentless-revolution-ch12b-eastern-europe-and-indias-transformation
  span: 887737:923523
  chunks:
  - id: appleby-relentless-revolution#u20-c1
    heading: Russia's captured privatization
    span: 888854:890095
    why: States the mechanism of Russia's failed shock therapy — elite and criminal capture outrunning
      state capacity — and its demographic consequence, the unit's central diagnosis of Eastern Europe's
      transition.
  - id: appleby-relentless-revolution#u20-c2
    heading: Naoroji's drain-theory statistics
    span: 893901:894221
    why: Naoroji's quantified indictment of colonial extraction is the pivot the unit credits with letting
      Indian reformers see the empire's economy as a political construction rather than a natural fact.
  - id: appleby-relentless-revolution#u20-c3
    heading: The bus and the rope
    span: 897533:897899
    why: The unit's single most concrete illustration of caste's grip, chosen to show how inherited status
      distinctions can override even survival instinct.
  - id: appleby-relentless-revolution#u20-c4
    heading: Singh dismantles the License Raj
    span: 901036:901437
    why: Identifies the specific 1991 reform — abolishing Nehru's regulatory License Raj — that the unit
      treats as the hinge of India's post-independence economic history.
  - id: appleby-relentless-revolution#u20-c5
    heading: Gandhi the inspiration, Mao the organizer
    span: 918334:918843
    why: The unit's own thesis sentence explaining why two countries with similar colonial-era poverty
      produced such different societies after independence.
  - id: appleby-relentless-revolution#u20-c6
    heading: An economy that grows at night
    span: 919374:919604
    why: A vivid closing folk saying that captures the unit's picture of India's private-sector vitality
      outpacing its slow, coalition-bound democratic state.
- nn: 21
  unit_id: ch13a-the-2008-financial-crisis
  note_id: appleby-relentless-revolution-ch13a-the-2008-financial-crisis
  span: 923523:964125
  chunks:
  - id: appleby-relentless-revolution#u21-c1
    heading: Globalization's meaning, revealed by the 2008 meltdown
    span: 923523:924448
    why: 'States the unit''s thesis in miniature: a rickety, globally interconnected structure of mortgage-based
      derivatives collapsed into a solvency crisis and revived the case for regulation.'
  - id: appleby-relentless-revolution#u21-c2
    heading: Credit default swaps explained
    span: 930672:931415
    why: Explains the era's signature unregulated instrument in Appleby's own vivid analogy and shows
      how it pulled the conservative insurer AIG toward collapse.
  - id: appleby-relentless-revolution#u21-c3
    heading: The two-decade arc of deregulation
    span: 929223:930026
    why: Names deregulation, from 1970s anti-regulatory sentiment to the 1999 Gramm-Leach-Bliley Act,
      as the crisis's first predisposing cause.
  - id: appleby-relentless-revolution#u21-c4
    heading: Unintended consequences of rational individual choices
    span: 935055:936294
    why: 'The unit''s core structural argument: no single actor intended the crisis, only the convergence
      of locally rational decisions by savers, policymakers, and bankers.'
  - id: appleby-relentless-revolution#u21-c5
    heading: Capitalism's need for a legal and civic substrate
    span: 963208:964123
    why: Delivers Appleby's closing claim that capitalism depends on external legal and civic institutions,
      and that rebuilding them after the crisis is an open political question.
- nn: 22
  unit_id: ch13b-capitalisms-legacy-poverty-and-the-green-economy
  note_id: appleby-relentless-revolution-ch13b-capitalisms-legacy-poverty-and-the-green-economy
  span: 964125:1009703
  chunks:
  - id: appleby-relentless-revolution#u22-c1
    heading: 'From periphery to center: capitalism''s origin story'
    span: 964161:964836
    why: States the unit's organizing thesis — that capitalism's flaws are legible in how commerce migrated
      from the margins of aristocratic society to become modernity's organizing center.
  - id: appleby-relentless-revolution#u22-c2
    heading: 'No coordinated center: why capitalism causes damage nobody intended'
    span: 1003253:1003961
    why: Appleby's clearest statement that capitalism is a decentralized, non-teleological aggregate of
      self-interested actors rather than a designed system, which is why crises happen without anyone
      steering toward them.
  - id: appleby-relentless-revolution#u22-c3
    heading: Yunus and the founding insight behind microlending
    span: 985599:985893
    why: Captures the empirical observation — poor women trapped by 30 percent loan-shark interest — that
      directly produced the Grameen Bank model discussed later in the unit.
  - id: appleby-relentless-revolution#u22-c4
    heading: 'The ''poverty museum'': Yunus''s stated end-goal'
    span: 989251:989601
    why: Yunus's vivid formulation of capitalism-compatible poverty eradication as an achievable historical
      endpoint, explicitly analogized to the abolition of slavery earlier in the unit.
  - id: appleby-relentless-revolution#u22-c5
    heading: Democracy and capitalism as an uneasy couple
    span: 1004210:1005321
    why: Appleby's central diagnostic claim about the two systems' relationship — majority-rule morality
      versus market amorality — that frames the book's final assessment of capitalism.
  - id: appleby-relentless-revolution#u22-c6
    heading: 'The book''s final verdict: relentless, not mindless'
    span: 1008857:1009702
    why: The unit's and book's closing paragraph, weighing Schumpeter's self-destruction thesis against
      capitalism's capacity for institutional learning, and delivering the title-referencing final line.
