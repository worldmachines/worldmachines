# Curated chunk sidecar for source `more-utopia` (Utopia, Thomas More, 1516).
# license_class: open (Project Gutenberg public domain) -> full verbatim quotes committed
# per docs/INGEST-LOCAL.md §14. Machine ingestion reads the scratch per-unit sidecars,
# not this file; this is the human-readable provenance record. Chunk ids follow
# `more-utopia#u<NN>-c<K>` and match each reading note's `cites:` field.
source: more-utopia
units:
  - nn: 1
    unit_id: introduction
    note_id: more-utopia-introduction
    span: 408:7887
    chunks:
      - id: more-utopia#u01-c1
        heading: 'Cardinal Morton''s household and the prophecy at table'
        start_quote: 'Cardinal Morton had been in earlier days that Bishop of Ely'
        end_quote: 'shall see this child here waiting at table prove a notable and rare man.”'
        why: 'Establishes the patron-prophecy frame the whole biography fulfills and the introduction''s only direct link between More''s household service and ''Utopia'' itself.'
      - id: more-utopia#u01-c2
        heading: 'Composition, printing, and the translation lineage to Burnet'
        start_quote: 'More’s “Utopia” was written in Latin, and is in two parts'
        end_quote: 'Burnet’s is the translation given in this volume.'
        why: 'The unit''s densest factual record of Utopia''s composition and transmission, from Louvain 1516 to the Burnet 1684 translation printed in this volume — the source''s own provenance chain.'
      - id: more-utopia#u01-c3
        heading: 'Plato, Plutarch, and the veiled political argument'
        start_quote: 'Designedly fantastic in suggestion of details, “Utopia” is the work of'
        end_quote: 'as a political attack on the policy of Henry VIII.'
        why: 'States explicitly what Utopia is doing formally and rhetorically: borrowing Plato and Plutarch to carry ''a noble English argument'' disguised as fiction about a foreign place.'
      - id: more-utopia#u01-c4
        heading: 'The word ''Utopian'' and the turn from fact to fiction'
        start_quote: 'The name of the book has given an adjective to our language'
        end_quote: 'only nine years before Utopia was written.'
        why: 'Marks the essay''s hinge from documented fact (the Flanders embassy) to invented fiction (Hythloday), and is the source of the word ''Utopian'' itself.'
      - id: more-utopia#u01-c5
        heading: 'Erasmus''s testimony to the book''s reception'
        start_quote: 'Erasmus wrote to a friend in 1517 that he should send'
        end_quote: 'so pleased with it that he knows it all by heart.”'
        why: 'Contemporary testimony from Erasmus closes the introduction''s argument that the fiction carries real political weight.'
  - nn: 2
    unit_id: book1-01-meeting-hythloday
    note_id: more-utopia-book1-01-meeting-hythloday
    span: 7887:16517
    chunks:
      - id: more-utopia#u02-c1
        heading: 'Introducing Hythloday: not a seaman but a philosopher'
        start_quote: 'Do you see that man? I was just thinking to bring him to you.'
        end_quote: 'except what is to be found in Seneca and Cicero.'
        why: 'Establishes Hythloday''s authority as a philosopher-traveler rather than a common seaman, the credential the rest of the dialogue depends on.'
      - id: more-utopia#u02-c2
        heading: 'Why Hythloday travels'
        start_quote: 'He is a Portuguese by birth, and was so desirous of seeing the world'
        end_quote: 'and he that had no grave had the heavens still over him.'
        why: 'Gives Hythloday''s motive for permanently forgoing home and inheritance to travel, framing his testimony as disinterested rather than acquisitive.'
      - id: more-utopia#u02-c3
        heading: 'From equatorial waste to flourishing commonwealths'
        start_quote: 'Under the equator, and as far on both sides of it as the sun moves'
        end_quote: 'but traded, both by sea and land, to very remote countries.'
        why: 'Stages the journey''s structural arc from wilderness to civilization that the Utopia narrative will complete.'
      - id: more-utopia#u02-c4
        heading: 'The compass, and a caution about capability'
        start_quote: 'He got wonderfully into their favour by showing them the use of the needle'
        end_quote: 'may, by their imprudence, become an occasion of much mischief to them.'
        why: 'The unit''s sole moment of editorializing about a new technology''s double edge, confidence outrunning safety.'
      - id: more-utopia#u02-c5
        heading: 'Monsters versus well-governed states'
        start_quote: 'We asked him many questions concerning all these things, to which he answered very willingly'
        end_quote: 'but it is not so easy to find states that are well and wisely governed.'
        why: 'States the book''s governing question in one sentence: institutional wisdom, not marvels, is the rare and valuable find.'
  - nn: 3
    unit_id: book1-02-serving-princes
    note_id: more-utopia-book1-02-serving-princes
    span: 16517:22293
    chunks:
      - id: more-utopia#u03-c1
        heading: 'Peter’s appeal and Raphael’s refusal on friends’ behalf'
        start_quote: 'I wonder, Raphael, how it comes that you enter into no king’s service,'
        end_quote: 'I should enslave myself to any king whatsoever.”'
        why: 'Opens the unit’s core dispute — Peter’s earnest case for royal service against Raphael’s flat refusal to be enslaved to any king, framed as a matter of what he owes his friends rather than a prince.'
      - id: more-utopia#u03-c2
        heading: '‘The change of the word does not alter the matter’'
        start_quote: '“Soft and fair!” said Peter; “I do not mean that you should be a slave to any king,'
        end_quote: 'which you can make your own condition happier.”'
        why: 'The exchange over ‘assist’ versus ‘slave’ — Raphael’s one-line rejoinder that changing the word doesn’t change the condition — is the unit’s sharpest formulation of service-as-capture.'
      - id: more-utopia#u03-c3
        heading: 'The ‘lasting fountain’: More’s case for engagement'
        start_quote: 'I perceive, Raphael, that you neither desire wealth nor greatness;'
        end_quote: 'would render you a very fit counsellor to any king whatsoever.”'
        why: 'More’s idealistic counter-argument, culminating in the ‘lasting fountain’ image, states the strongest available case that a wise counsellor could reform government from within.'
      - id: more-utopia#u03-c4
        heading: 'Self-satisfied ministers and the flattery instinct'
        start_quote: 'and, among the ministers of princes, there are none that are not so wise as to need no assistance,'
        end_quote: 'the old crow loves his young, and the ape her cubs.'
        why: 'Raphael’s anatomy of court flattery — self-satisfied ministers and the instinct that ‘the old crow loves his young, and the ape her cubs’ — explains structurally why new counsel cannot penetrate a prince’s circle.'
      - id: more-utopia#u03-c5
        heading: 'Reverence for ancestors as an argument-stopper'
        start_quote: 'Now if in such a court, made up of persons who envy all others and only admire themselves,'
        end_quote: 'as if it were a great misfortune that any should be found wiser than his ancestors.'
        why: 'The ancestor-worship passage is Raphael’s clinching argument: even when courtiers cannot rebut a better proposal, deference to ‘our ancestors’ lets them dismiss it anyway, foreclosing reform categorically.'
  - nn: 4
    unit_id: book1-03-cardinal-morton-theft
    note_id: more-utopia-book1-03-cardinal-morton-theft
    span: 22293:35503
    chunks:
      - id: more-utopia#u04-c1
        heading: 'The Lawyer''s Boast and Hythloday''s Rebuttal'
        start_quote: 'there happened to be at table one of the English lawyers'
        end_quote: 'from robbing who can find out no other way of livelihood.'
        why: 'Opens the unit''s central claim that punishing theft with death is neither just nor effective when the state leaves the causes of theft untouched.'
      - id: more-utopia#u04-c2
        heading: 'Idle Retainers: the Nobility''s Disposable Soldiers'
        start_quote: 'There is a great number of noblemen among you'
        end_quote: 'in so low a diet as he can afford to give him.'
        why: 'Supplies the first concrete mechanism -- noble households bred and then discarded fighting men -- by which English institutions manufacture the thieves they hang.'
      - id: more-utopia#u04-c3
        heading: 'Sheep Devour Men: the Enclosure Passage'
        start_quote: '‘The increase of pasture,’ said I'
        end_quote: 'or to go about and beg?'
        why: 'The unit''s most famous and consequential passage, tracing mass eviction and vagrancy directly to the conversion of common and tenanted land into sheep pasture.'
      - id: more-utopia#u04-c4
        heading: 'France''s Standing Armies as Cautionary Parallel'
        start_quote: 'In France there is yet a more pestiferous sort of people'
        end_quote: 'for keeping their hands in use, that they may not grow dull by too long an intermission.”'
        why: 'Generalizes the idle-retainer argument from noble households to the nation-state, warning that permanently maintained violence is corrosive even at peace.'
      - id: more-utopia#u04-c5
        heading: 'You First Make Thieves and Then Punish Them'
        start_quote: 'Banish these plagues, and give orders that those who have dispeopled so much soil'
        end_quote: 'what else is to be concluded from this but that you first make thieves and then punish them?'
        why: 'The unit''s closing aphorism, compressing the entire preceding catalogue of causes into a single indictment of the state''s bad faith.'
  - nn: 5
    unit_id: book1-04-polylerits-punishment
    note_id: more-utopia-book1-04-polylerits-punishment
    span: 35503:47140
    chunks:
      - id: more-utopia#u05-c1
        heading: 'Extreme Justice Is an Extreme Injury'
        start_quote: 'It seems to me a very unjust thing to take away a man’s life for a little money'
        end_quote: 'if we examine things impartially, there is no likeness nor proportion.'
        why: 'States the proportionality principle that grounds Hythloday''s entire case against hanging thieves.'
      - id: more-utopia#u05-c2
        heading: 'Restitution to the Owner, Not the Prince'
        start_quote: 'Those that are found guilty of theft among them are bound to make restitution to the owner'
        end_quote: 'they are well used and treated without any mark of reproach;'
        why: 'Lays out the core mechanic of the proposed alternative: restitution and unchained public labor in place of execution.'
      - id: more-utopia#u05-c3
        heading: 'Marked, Not Chained'
        start_quote: 'They all wear a peculiar habit, of one certain colour, and their hair is cropped a little above their ears'
        end_quote: 'the very attempt of an escape is no less penal than an escape itself.'
        why: 'Shows the Polylerits controlled entirely through visible marking rather than physical restraint, a legibility apparatus doing the work of a prison.'
      - id: more-utopia#u05-c4
        heading: 'No Coordinated Escape, a Real Path to Parole'
        start_quote: 'The only danger to be feared from them is their conspiring against the government'
        end_quote: 'some are every year restored to it upon the good character that is given of them.'
        why: 'Shows the system securing itself through engineered isolation while still holding open a genuine route back to freedom, unlike a purely retributive death penalty.'
      - id: more-utopia#u05-c5
        heading: 'The Same Proposal, Two Receptions'
        start_quote: 'To this he answered, ‘That it could never take place in England without endangering the whole nation.’'
        end_quote: 'commended what related to the vagabonds, because it was his own observation.'
        why: 'Delivers the unit''s satirical punchline: the identical proposal is dismissed from Raphael and applauded from the Cardinal.'
  - nn: 6
    unit_id: book1-05-jester-and-mock-counsel
    note_id: more-utopia-book1-05-jester-and-mock-counsel
    span: 47140:58134
    chunks:
      - id: more-utopia#u06-c1
        heading: 'The Fool''s beggars-to-monasteries proposal'
        start_quote: '‘Leave that to me,’ said the Fool, ‘and I shall take care of them,'
        end_quote: 'to be made lay-brothers, and the women to be nuns.’'
        why: 'Sets up the unit''s comic register and its satire of provision for the poor being reduced to a joke that only becomes policy once the Cardinal smiles at it.'
      - id: more-utopia#u06-c2
        heading: 'The Fool and the Friar trade Scripture'
        start_quote: '‘Good Friar,’ said he, ‘be not angry, for it is written,'
        end_quote: 'We have, likewise, a bull, by which all that jeer us are excommunicated.’'
        why: 'The set-piece''s comic peak, satirizing clerical vanity and hair-trigger zeal through an escalating war of half-apt biblical citations.'
      - id: more-utopia#u06-c3
        heading: 'Raphael on why courtiers only echo power'
        start_quote: '“Thus, Mr. More, I have run out into a tedious story, of the length of'
        end_quote: 'how little courtiers would value either me or my counsels.”'
        why: 'The hinge passage where Raphael states outright the thesis the jester scene was staged to prove: courtiers value only what power has already endorsed.'
      - id: more-utopia#u06-c4
        heading: 'The Achorians'' ruinous conquest'
        start_quote: 'the resolutions of the Achorians, a people that lie on the south-east of Utopia,'
        end_quote: 'was forced to quit his new kingdom to one of his friends (who was not long after dethroned), and to be contented with his old one.'
        why: 'The unit''s central political argument: a full parable showing conquest''s costs in taxes, bloodshed, lawlessness, and divided royal attention, resolved only when the people force the king to relinquish the new kingdom.'
      - id: more-utopia#u06-c5
        heading: 'Raphael''s moral, and More''s concession'
        start_quote: 'To this I would add that after all those warlike attempts, the vast confusions,'
        end_quote: '“I confess,” said I, “I think not very well.”'
        why: 'Raphael generalizes the fable into explicit counsel against imperial overreach, and More''s terse admission that such a speech would fail closes the frame on a note of irony.'
  - nn: 7
    unit_id: book1-06-treasure-and-corrupt-counsel
    note_id: more-utopia-book1-06-treasure-and-corrupt-counsel
    span: 58134:65874
    chunks:
      - id: more-utopia#u07-c1
        heading: 'The counsellors'' premise and the currency-manipulation scheme'
        start_quote: '“But what,” said he, “if I should sort with another kind of ministers,'
        end_quote: 'and in a little receive a great deal.'
        why: 'Establishes the unit''s frame — a hypothetical council of extraction-minded ministers — and its first stratagem, timing currency revaluation to the king''s debts versus revenues.'
      - id: more-utopia#u07-c2
        heading: 'How the judiciary is captured'
        start_quote: 'Another proposes that the judges must be made sure, that they may'
        end_quote: 'and to which a religious judge ought to have a special regard.'
        why: 'The unit''s technical centerpiece: a step-by-step mechanism of judicial corruption via patronage, manufactured dissent, and the trump card of royal prerogative over law.'
      - id: more-utopia#u07-c3
        heading: 'Crassus''s maxim: total royal property'
        start_quote: 'Thus all consent to that maxim of Crassus, that a prince cannot'
        end_quote: 'but that which the king, out of his goodness, thinks fit to leave him.'
        why: 'Compresses the extractive counsellors'' whole worldview into one quotable claim — that all property, including subjects'' persons, belongs to the king.'
      - id: more-utopia#u07-c4
        heading: 'Raphael''s rebuttal: poverty breeds rebellion, not submission'
        start_quote: 'It is also certain that they are much mistaken that think the'
        end_quote: 'is to be a gaoler and not a king.’'
        why: 'Raphael''s direct counter-doctrine, closing with the Fabricius quotation that a king who thrives amid his subjects'' misery is a gaoler, not a king.'
      - id: more-utopia#u07-c5
        heading: 'The Macarian law capping royal treasure'
        start_quote: 'To these things I would add that law among the Macarians—a people that live'
        end_quote: 'will be the terror of ill men, and will be beloved by all the good.'
        why: 'The unit''s one concrete institutional design: a coronation oath hard-capping royal treasure to prevent both domestic oppression and foreign war.'
  - nn: 8
    unit_id: book1-07-philosophy-in-courts
    note_id: more-utopia-book1-07-philosophy-in-courts
    span: 65874:72196
    chunks:
      - id: more-utopia#u08-c1
        heading: 'The pliable philosophy of the stage'
        start_quote: 'but not for this speculative philosophy, that makes everything'
        end_quote: 'that is a blessing that I do not at present hope to see.'
        why: 'This is the persona More''s full argument for civil philosophy — the Plautus-comedy analogy and the ''cast about'' doctrine that Hythloday spends the rest of the unit refuting.'
      - id: more-utopia#u08-c2
        heading: 'The leaden rule: preachers as precedent'
        start_quote: 'The greatest parts of His precepts are more opposite to the lives of the men of this age'
        end_quote: 'men become more secure in their wickedness by it'
        why: 'Hythloday''s sharpest analogy — clergy already perform the ''casting about'' More recommends, and the result is not virtue but comfortable wickedness.'
      - id: more-utopia#u08-c3
        heading: 'Casting about as corruption'
        start_quote: 'I do not comprehend what you mean by your'
        end_quote: 'he must bear his share of all the blame that belongs wholly to others.'
        why: 'Hythloday''s core structural rebuttal: court participation offers no safe middle position, since silence reads as treason and mere proximity taints the honest man with others'' guilt.'
      - id: more-utopia#u08-c4
        heading: 'Plato''s rain: withdrawal as self-preservation'
        start_quote: 'It was no ill simile by which Plato set forth'
        end_quote: 'to take care to preserve himself.'
        why: 'The dialogue''s closing image and its clearest resonance with the capture-resistance ''full withdrawal'' failure mode — preserving the self by refusing the corrupting institution outright.'
  - nn: 9
    unit_id: book1-08-common-ownership
    note_id: more-utopia-book1-08-common-ownership
    span: 72196:80374
    chunks:
      - id: more-utopia#u09-c1
        heading: 'The thesis: property and money foreclose just or happy government'
        start_quote: '“Though, to speak plainly my real sentiments, I must freely own'
        end_quote: 'the rest being left to be absolutely miserable.'
        why: 'States the unit''s central, quotable thesis that property and money make just or happy government impossible.'
      - id: more-utopia#u09-c2
        heading: 'The two sorts of people property produces'
        start_quote: 'So that there will be two sorts of people among them'
        end_quote: 'will be still oppressed with a load of cares and anxieties.'
        why: 'Names the two classes property produces — the idle few who capture wealth and the industrious many left oppressed — the unit''s clearest statement of structural capture.'
      - id: more-utopia#u09-c3
        heading: 'Peter''s objection: incentive and civil order'
        start_quote: '“On the contrary,” answered I, “it seems to me that men'
        end_quote: 'that are in all things equal to one another.”'
        why: 'Stages the standard incentive-and-order objection to common ownership, giving the debate its dramatic tension.'
      - id: more-utopia#u09-c4
        heading: 'Five years among the Utopians'
        start_quote: '“I do not wonder,” said he, “that it appears so to you'
        end_quote: 'you had never seen a people so well constituted as they.”'
        why: 'Raphael answers a philosophical objection with lived witness, converting argument into eyewitness authority and licensing the fiction''s central device.'
      - id: more-utopia#u09-c5
        heading: 'The shipwreck and asymmetric learning'
        start_quote: 'They call us all by a general name of ‘The'
        end_quote: 'though we come not short of them in point of understanding or outward advantages.”'
        why: 'The shipwreck anecdote contrasts Utopia''s absorption of foreign learning with Europe''s failure to learn from its own contact with Utopia.'
  - nn: 10
    unit_id: book1-09-island-of-utopia
    note_id: more-utopia-book1-09-island-of-utopia
    span: 80374:87012
    chunks:
      - id: more-utopia#u10-c1
        heading: 'The Hidden Channel'
        start_quote: 'But the entry into the bay, occasioned'
        end_quote: 'how great soever it were, would be certainly lost.'
        why: 'The single native-known channel through a booby-trapped bay makes Utopia a portal-bordered, opacity-defended space—legible to insiders, lethal to outsiders.'
      - id: more-utopia#u10-c2
        heading: 'Utopus Digs the Island Free'
        start_quote: 'But they report (and there remains good marks'
        end_quote: 'were struck with admiration and terror.'
        why: 'The founding myth roots Utopian order in a literal infrastructure project, with Utopus sharing the labor to legitimate the new order rather than simply imposing it by conquest.'
      - id: more-utopia#u10-c3
        heading: 'Fifty-Four Cities, One Plan'
        start_quote: 'There are fifty-four cities in the island, all large'
        end_quote: 'the people consider themselves rather as tenants than landlords.'
        why: 'The mandated uniformity of fifty-four cities—identical laws, fixed spacing, centralized assembly—is the passage''s clearest statement of legibility as the organizing principle of Utopian space.'
      - id: more-utopia#u10-c4
        heading: 'Rotating the Husbandmen'
        start_quote: 'Inhabitants are sent, by turns, from the cities'
        end_quote: 'bring them under a scarcity of corn.'
        why: 'The two-year farm rotation is Utopia''s mechanism for guaranteeing universal agricultural competence, engineering scarcity out of the system by design rather than by luck.'
      - id: more-utopia#u10-c5
        heading: 'Surplus Without Exchange'
        start_quote: 'and though they know exactly how much corn'
        end_quote: 'without carrying anything in exchange for it.'
        why: 'Surplus corn and cattle move to neighboring towns with no exchange demanded in return, making visible Utopia''s rejection of market logic even at the town-to-town scale.'
  - nn: 11
    unit_id: book2-01-towns-amaurot
    note_id: more-utopia-book2-01-towns-amaurot
    span: 87012:92275
    chunks:
      - id: more-utopia#u11-c1
        heading: 'All towns alike: introducing Amaurot'
        start_quote: 'He that knows one of their towns knows them all—they are so'
        end_quote: 'I having lived five years all together in it.'
        why: 'Sets the premise that Utopian order is a replicable template, not organic accretion — Amaurot stands in for all the Utopian towns.'
      - id: more-utopia#u11-c2
        heading: 'Fortifying the water supply'
        start_quote: 'The inhabitants have fortified the fountain-head of this river, which'
        end_quote: 'which supplies the want of the other.'
        why: 'Shows Utopian civic planning extending engineered resilience into the town''s water supply against siege and poisoning.'
      - id: more-utopia#u11-c3
        heading: 'Uniform streets, doorless property, houses by lot'
        start_quote: 'The town is compassed with a high and thick wall, in which there'
        end_quote: 'At every ten years’ end they shift their houses by lots.'
        why: 'The core legibility passage: identical buildings, measured streets, no property, and houses redistributed by lottery every ten years.'
      - id: more-utopia#u11-c4
        heading: 'Utopus''s design, left for descendants to finish'
        start_quote: 'They cultivate their gardens with great care, so that they have both'
        end_quote: 'that being too much for one man to bring to perfection.'
        why: 'Frames the town as a founder''s frame elaborated by later generations — infrastructure laid down once and inhabited across centuries.'
      - id: more-utopia#u11-c5
        heading: 'Seventeen hundred and sixty years of recorded improvement'
        start_quote: 'Their records, that contain the history of their town and State, are'
        end_quote: 'and gives free admission to the light.'
        why: 'The town''s own archives narrate steady material progress from mud cottages to fireproof, glazed buildings, making Amaurot''s history legible fact.'
  - nn: 12
    unit_id: book2-02-magistrates
    note_id: more-utopia-book2-02-magistrates
    span: 92275:95096
    chunks:
      - id: more-utopia#u12-c1
        heading: 'The elective pyramid and the secret ballot for Prince'
        start_quote: 'Thirty families choose every year a magistrate, who was anciently'
        end_quote: 'it is not known for whom every one gives his suffrage.'
        why: 'Lays out the nested, countable electoral hierarchy and the secret ballot that together make Utopian authority legible yet unattributable to any single traceable elector.'
      - id: more-utopia#u12-c2
        heading: 'Life tenure, revocability, and the three-day rule'
        start_quote: 'The Prince is for life, unless he is removed upon suspicion'
        end_quote: 'in the assembly of the whole body of the people.'
        why: 'Bundles the Prince''s conditional life tenure, the rotating council observers, the mandatory multi-day debate rule, and the capital ban on off-channel political meetings — the full procedural toolkit restraining magistrates.'
      - id: more-utopia#u12-c3
        heading: 'Engineered against conspiracy between Prince and Tranibors'
        start_quote: 'These things have been so provided among them that the Prince and the Tranibors'
        end_quote: 'the matter is referred to the council of the whole island.'
        why: 'States outright that the entire referral chain exists specifically to prevent elite collusion to seize and enslave the state — the passage''s explicit thesis.'
      - id: more-utopia#u12-c4
        heading: 'The cooling-off rule and its psychological rationale'
        start_quote: 'One rule observed in their council is, never to debate a thing'
        end_quote: 'rather be deliberate than sudden in their motions.'
        why: 'Diagnoses sunk-cost reasoning and face-saving stubbornness as risks to deliberation, and prescribes a same-day debate ban as the institutional remedy.'
  - nn: 13
    unit_id: book2-03-trades
    note_id: more-utopia-book2-03-trades
    span: 95096:105597
    chunks:
      - id: more-utopia#u13-c1
        heading: 'Trade Assigned by Descent, Redirected by Inclination'
        start_quote: 'The same trade generally passes down from father to son, inclinations often following descent'
        end_quote: 'he follows that which he likes best, unless the public has more occasion for the other.'
        why: 'Shows Utopian labor assignment giving individual inclination real room within family/trade structure, then explicitly subordinating it to public need — the chapter''s clearest statement of legibility-tempered conatus.'
      - id: more-utopia#u13-c2
        heading: 'The Six-Hour Day'
        start_quote: 'dividing the day and night into twenty-four hours, appoint six of these for work'
        end_quote: 'must employ it in some proper exercise, according to their various inclinations, which is, for the most part, reading.'
        why: 'The precise, magistrate-audited division of the day into legible hours is the mechanism underwriting the chapter''s abundance argument.'
      - id: more-utopia#u13-c3
        heading: 'Money Manufactures Vanity, Not Value'
        start_quote: 'for we, who measure all things by money, give rise to many trades that are both vain and superfluous'
        end_quote: 'the prices of them would so sink that tradesmen could not be maintained by their gains'
        why: 'States the chapter''s core economic thesis: money-driven demand manufactures useless labor that a rationally planned economy doesn''t need.'
      - id: more-utopia#u13-c4
        heading: 'One Garment, Two Years'
        start_quote: 'While in other places four or five upper garments of woollen cloth of different colours'
        end_quote: 'he would neither be the, warmer nor would he make one jot the better appearance for it.'
        why: 'Concrete illustration of the anti-luxury argument: uniform, durable, undyed dress needs a fraction of the labor fashion-driven dress elsewhere consumes.'
      - id: more-utopia#u13-c5
        heading: 'Labour as Means, Mind as End'
        start_quote: 'The magistrates never engage the people in unnecessary labour, since the chief end'
        end_quote: 'the improvement of their minds, in which they think the happiness of life consists.'
        why: 'The chapter''s closing thesis: labor is deliberately minimized so time can be reallocated to study, making leisure-for-the-mind the explicit end of the whole economic design.'
  - nn: 14
    unit_id: book2-04-traffic
    note_id: more-utopia-book2-04-traffic
    span: 105597:116816
    chunks:
      - id: more-utopia#u14-c1
        heading: 'Family and city size as a managed quota'
        start_quote: 'but lest any city should become either too great, or by any accident be dispeopled'
        end_quote: 'to any other family that does not abound so much in them.'
        why: 'States the exact numeric caps and the rebalancing mechanism (moving children between households) that make Utopian demography a legible, actively corrected system.'
      - id: more-utopia#u14-c2
        heading: 'Natural law, idle land, and the justice of expulsion'
        start_quote: 'But if the natives refuse to conform themselves to their laws they drive them out'
        end_quote: 'a right to such a waste portion of the earth as is necessary for his subsistence.'
        why: 'The passage where classifying land as uncultivated ''waste'' becomes the natural-law justification for driving out or warring on its inhabitants.'
      - id: more-utopia#u14-c3
        heading: 'Common storehouses and the psychology of want'
        start_quote: 'and thither every father goes, and takes whatsoever he or his family stand in need of'
        end_quote: 'excel others in pomp and excess; but by the laws of the Utopians, there is no room for this.'
        why: 'Lays out the moneyless distribution system and its explicit theory of vice — fear of want versus prideful excess — that the whole arrangement is built to suppress.'
      - id: more-utopia#u14-c4
        heading: 'The hospitals outside the walls'
        start_quote: 'But they take more care of their sick than of any others; these are lodged'
        end_quote: 'would not choose rather to go thither than lie sick at home.'
        why: 'Describes the public hospital system in enough detail to show both its genuine generosity and its deliberate placement outside the town boundary.'
      - id: more-utopia#u14-c5
        heading: 'Age, rank, and moral instruction at the communal table'
        start_quote: 'Thus old men are honoured with a particular respect, yet all the rest fare as well as they.'
        end_quote: 'find out the force of every one’s spirit and observe his temper.'
        why: 'Shows that communal dining is a hierarchically graded, actively pedagogical ritual rather than a flat egalitarian meal.'
  - nn: 15
    unit_id: book2-05-travelling-01-trade-and-gold
    note_id: more-utopia-book2-05-travelling-01-trade-and-gold
    span: 116816:130230
    chunks:
      - id: more-utopia#u15-c1
        heading: 'Passports, licensed travel, and slavery as punishment'
        start_quote: 'If any man has a mind to visit his friends that live in some other town, or desires to travel'
        end_quote: 'and, if he falls again into the like fault, is condemned to slavery.'
        why: 'Establishes the unit''s opening institution: travel is licensed, tracked, and time-limited, with unlicensed travel escalating from vagrancy punishment to slavery.'
      - id: more-utopia#u15-c2
        heading: 'No corners, no parties — life in full view'
        start_quote: 'There are no taverns, no ale-houses, nor stews among them, nor any other occasions of corrupting each other'
        end_quote: 'and these being equally distributed among them, no man can want or be obliged to beg.'
        why: 'States the civic-visibility logic underlying Utopian order: eliminating private space to guarantee universal labor and equal distribution.'
      - id: more-utopia#u15-c3
        heading: 'The Amaurot council: provisions as one family''s accounting'
        start_quote: 'In their great council at Amaurot, to which there are three sent from every town once a year'
        end_quote: 'so that indeed the whole island is, as it were, one family.'
        why: 'The clearest statement of Utopia''s inter-town redistribution mechanism, framed explicitly as accounting rather than market exchange.'
      - id: more-utopia#u15-c4
        heading: 'Gold made vile: chamber-pots, chains, and the loss of a penny'
        start_quote: 'They eat and drink out of vessels of earth or glass, which make an agreeable appearance'
        end_quote: 'but as the parting with a trifle, or as we would esteem the loss of a penny!'
        why: 'The concrete institutional design that operationalizes Utopia''s philosophy of value, deliberately stripping gold of prestige.'
      - id: more-utopia#u15-c5
        heading: 'Children mock the gold-clad ambassadors'
        start_quote: 'You might have seen the children who were grown big enough to despise their playthings'
        end_quote: 'this, I believe, is one of the ambassadors’ fools.’'
        why: 'The satirical set-piece where Utopian custom inverts the Anemolians'' intended display of status, dramatizing the unit''s argument.'
      - id: more-utopia#u15-c6
        heading: 'A man of lead served for his heap of metal'
        start_quote: 'They wonder much to hear that gold, which in itself is so useless a thing, should be'
        end_quote: 'should have many wise and good men to serve him, only because he has a great heap of that metal'
        why: 'The unit''s closing philosophical generalization: deference to wealth divorced from human worth is the folly the whole institution is built to prevent.'
  - nn: 16
    unit_id: book2-05-travelling-02-pleasure-ethics
    note_id: more-utopia-book2-05-travelling-02-pleasure-ethics
    span: 130230:140549
    chunks:
      - id: more-utopia#u16-c1
        heading: 'Rejecting scholastic abstraction, keeping astronomy'
        start_quote: 'They are so far from minding chimeras and fantastical images made in the mind'
        end_quote: 'they knew astronomy, and were perfectly acquainted with the motions of the heavenly bodies'
        why: 'Shows the Utopians'' natural philosophy is defined by rejecting scholastic abstraction (the ''man in the abstract'' puzzle) while retaining genuine empirical competence.'
      - id: more-utopia#u16-c2
        heading: 'Empirical weather-reading versus astrological divination'
        start_quote: 'But for the cheat of divining by the stars, by their oppositions or conjunctions'
        end_quote: 'when they may look for rain, wind, or other alterations in the air'
        why: 'Sharpens the line between legitimate observational science and occult divination, the unit''s clearest statement of Utopian empiricism.'
      - id: more-utopia#u16-c3
        heading: 'Religion as the ground of rational pleasure-seeking'
        start_quote: 'These are their religious principles:—That the soul of man is'
        end_quote: 'if there is nothing to be expected after death?'
        why: 'The unit''s central and most surprising argument: immortality and afterlife reward are what make hedonism rational rather than merely appetitive.'
      - id: more-utopia#u16-c4
        heading: 'Self-love as the ground of duty to others'
        start_quote: 'A life of pleasure is either a real evil, and in that case we'
        end_quote: 'at the same time to be unmerciful and cruel to ourselves.'
        why: 'The sharpest logical move in the unit, deriving a duty to oneself from the duty to relieve others'' misery and collapsing self-love versus altruism into one Natural drive.'
      - id: more-utopia#u16-c5
        heading: 'False pleasure as a category error'
        start_quote: 'But they look upon those delights which men by a foolish, though common,'
        end_quote: 'there is no room left for pleasures of a truer or purer kind.'
        why: 'Closes the ethical argument by naming the one failure mode the calculus is built to guard against: delusive pleasures that crowd out true ones.'
  - nn: 17
    unit_id: book2-05-travelling-03-true-pleasures
    note_id: more-utopia-book2-05-travelling-03-true-pleasures
    span: 140549:154077
    chunks:
      - id: more-utopia#u17-c1
        heading: 'Fine Clothes and False Nobility'
        start_quote: 'For if you consider the use of clothes, why should a fine thread be thought better than a coarse one?'
        end_quote: 'and even resent it as an affront if that respect is not paid them.'
        why: 'Opens the Utopians'' critique of manufactured status value, showing that the respect attached to fine clothing is a self-deceiving fiction with no basis in the clothes'' actual use.'
      - id: more-utopia#u17-c2
        heading: 'Hoarding Wealth as a False Shadow of Joy'
        start_quote: 'Or can it be thought that they who heap up a useless mass of wealth'
        end_quote: 'for both ways it was equally useless to him.'
        why: 'Uses the thought experiment of an undiscovered theft to prove the miser''s pleasure was never real, since nothing about his life changes whether the buried wealth exists or not.'
      - id: more-utopia#u17-c3
        heading: 'The Cruelty Beneath the Sport of Hunting'
        start_quote: 'Nor can they comprehend the pleasure of seeing dogs run after a hare, more than of seeing one dog run after another;'
        end_quote: 'must degenerate into it.'
        why: 'Walks through the possible sources of hunting''s appeal by elimination until only cruelty remains, turning a celebrated aristocratic pastime into evidence of a corrupted mind.'
      - id: more-utopia#u17-c4
        heading: 'Health as the Foundation of All Pleasure'
        start_quote: 'Another kind of bodily pleasure is that which results from an undisturbed and vigorous constitution of body, when life and active spirits seem to actuate every part.'
        end_quote: 'a man is really capable of no other pleasure.'
        why: 'States the Utopians'' central physiological claim: unbroken health, not any particular sensation, is the greatest pleasure and the precondition for every other joy.'
      - id: more-utopia#u17-c5
        heading: 'Ranking the Pleasures: Mind Over Appetite'
        start_quote: 'But, of all pleasures, they esteem those to be most valuable that lie in the mind, the chief of which arise out of true virtue and the witness of a good conscience.'
        end_quote: 'it is more desirable not to need this sort of pleasure than to be obliged to indulge it.'
        why: 'Establishes the Utopians'' hierarchy of pleasures, subordinating even legitimate bodily pleasure to the mind''s virtue and to bare need rather than to indulgence.'
  - nn: 18
    unit_id: book2-05-travelling-04-greek-learning
    note_id: more-utopia-book2-05-travelling-04-greek-learning
    span: 154077:161230
    chunks:
      - id: more-utopia#u18-c1
        heading: 'Vigor and land-improvement'
        start_quote: 'Their bodies are vigorous and lively; and though they are'
        end_quote: 'harder work to carry wood at any distance over land than corn.'
        why: 'Establishes the unit''s governing motif of Utopian vigor — physical health and industrious re-engineering of a mediocre landscape produced by effort rather than natural endowment.'
      - id: more-utopia#u18-c2
        heading: 'Three-year mastery of Greek'
        start_quote: 'The people are industrious, apt to learn, as well as cheerful and'
        end_quote: 'so that they read the best of the Greek authors very exactly.'
        why: 'Shows the Utopians'' explosive, self-motivated mastery of Greek as the unit''s central demonstration of appetite for learning.'
      - id: more-utopia#u18-c3
        heading: 'The great machine of the universe'
        start_quote: 'for though there is no nation in the world that needs physic so'
        end_quote: 'with the eyes of a dull and unconcerned spectator.'
        why: 'Gives the unit''s fullest statement of why Utopians value natural philosophy and medicine, as reverent contemplation of a divinely engineered cosmic mechanism.'
      - id: more-utopia#u18-c4
        heading: 'Reinventing paper and print'
        start_quote: 'The minds of the Utopians, when fenced with a love for learning, are'
        end_quote: 'by several impressions, they have multiplied them into many thousands.'
        why: 'Documents the Utopians independently reverse-engineering papermaking and printing from mere hints, the unit''s clearest case of applied ingenuity.'
      - id: more-utopia#u18-c5
        heading: 'Trade kept in Utopian hands'
        start_quote: 'Very few go among them on the account of traffic; for what can a'
        end_quote: 'which cannot be maintained but by much practice.'
        why: 'Explains the Utopians'' rationale for handling their own foreign trade — preserving political and technical self-sufficiency rather than ceding it to outsiders.'
  - nn: 19
    unit_id: book2-06-slaves-marriages
    note_id: more-utopia-book2-06-slaves-marriages
    span: 161230:180188
    chunks:
      - id: more-utopia#u19-c1
        heading: 'The Origins of Utopian Slaves'
        start_quote: 'They do not make slaves of prisoners of war, except those that are taken'
        end_quote: 'whom they sometimes redeem at low rates, and in other places have them for nothing.'
        why: 'Defines Utopia’s three-tier slavery system (domestic criminals, condemned foreigners, and volunteer foreign laborers) and the harsher standard applied to its own citizens, the premise for the unit’s later punishments.'
      - id: more-utopia#u19-c2
        heading: 'Sanctioned Voluntary Death'
        start_quote: 'but when any is taken with a torturing and lingering pain, so that'
        end_quote: 'none of the honours of a decent funeral, but throw his body into a ditch.'
        why: 'The clearest statement of Utopia’s sanctioned, priest-mediated euthanasia and its sharp line between honored and dishonored death.'
      - id: more-utopia#u19-c3
        heading: 'The Nude Pre-Marital Inspection'
        start_quote: 'Before marriage some grave matron presents the bride, naked, whether she is'
        end_quote: 'there should be good provision made against such mischievous frauds.'
        why: 'The notorious pre-marital nude-inspection passage, argued by direct analogy to buying a horse, and the unit’s most literal instance of legibility applied to the body.'
      - id: more-utopia#u19-c4
        heading: 'No Lawyers, Plain Laws'
        start_quote: 'They have no lawyers among them, for they consider them as'
        end_quote: 'the plainest meaning of which words are capable is always the sense of their laws'
        why: 'States Utopia’s abolition of lawyers and its founding legal principle that a law’s plainest sense is its only sense — the unit’s clearest legibility-of-law claim.'
      - id: more-utopia#u19-c5
        heading: 'Two Sorts of Justice'
        start_quote: 'By this means it is that all sort of justice passes in the world'
        end_quote: 'lawful and unlawful are only measured by pleasure and interest.'
        why: 'The ‘two sorts of justice’ passage: the text’s bluntest statement that plain, binding law is for the ruled while princes cultivate deliberate ambiguity for themselves.'
      - id: more-utopia#u19-c6
        heading: 'Human Partnership Instead of a League'
        start_quote: 'they, on the other hand, judge that no man is to be esteemed'
        end_quote: 'the engagements of men’s hearts become stronger than the bond and obligation of words.'
        why: 'Closes the unit’s account of foreign policy with Utopia’s positive alternative to treaties: natural human partnership over ‘the bond and obligation of words.’'
  - nn: 20
    unit_id: book2-07-military-discipline
    note_id: more-utopia-book2-07-military-discipline
    span: 180188:200103
    chunks:
      - id: more-utopia#u20-c1
        heading: 'War as brutal and inglorious'
        start_quote: 'They detest war as a very brutal thing, and which, to the reproach of'
        end_quote: 'assist an oppressed nation in shaking off the yoke of tyranny.'
        why: 'States the chapter''s inverted martial ethic and the narrow grounds — defense, aiding allies, freeing the oppressed — on which the Utopians will countenance war at all.'
      - id: more-utopia#u20-c2
        heading: 'Sealed bounties on enemy leaders'
        start_quote: 'As soon as they declare war, they take care to have a great many schedules'
        end_quote: 'that there is no sort of crime to which men cannot be drawn by them.'
        why: 'Shows the Utopians converting war into a priced, administered transaction that corrupts the enemy''s own people into betrayal instead of risking battle.'
      - id: more-utopia#u20-c3
        heading: 'The Zapolets as consumable troops'
        start_quote: 'The Utopians hold this for a maxim, that as they seek out the best sort'
        end_quote: 'that seem to have run together, as to the drain of human nature.'
        why: 'Makes explicit the sorting of populations into best (kept for Utopian use) and expendable (hired out to die), the starkest instance of the chapter''s actuarial logic.'
      - id: more-utopia#u20-c4
        heading: 'Families fighting side by side'
        start_quote: 'But as they force no man to go into any foreign war against his will'
        end_quote: 'they continue to fight to the last man, if their enemies stand before them'
        why: 'Shows Utopian courage as relational and domestic rather than martial glory-seeking, with kinship proximity in the battle line substituting for honor codes.'
      - id: more-utopia#u20-c5
        heading: 'No plunder, then a standing tribute'
        start_quote: 'When a town is surrendered to them, they take it into their protection'
        end_quote: 'is now risen to above 700,000 ducats a year.'
        why: 'Traces the arc from restraint toward the defeated (no plunder, protected surrender) to the conversion of conquest into a calculated, recurring revenue stream.'
  - nn: 21
    unit_id: book2-08-religions-01-toleration
    note_id: more-utopia-book2-08-religions-01-toleration
    span: 200103:211092
    chunks:
      - id: more-utopia#u21-c1
        heading: 'Natural theology and the name Mithras'
        start_quote: 'There are several sorts of religions, not only in different'
        end_quote: 'ascribed by the consent of all nations.'
        why: 'Establishes the chapter''s central claim that Utopia''s plural local cults converge on a shared natural theology, the philosophical baseline the toleration law protects.'
      - id: more-utopia#u21-c2
        heading: 'Christianity received without a priesthood'
        start_quote: 'After they had heard from us an account of the doctrine, the course of'
        end_quote: 'long most vehemently for them.'
        why: 'Shows Christianity''s warm reception constrained by a real structural gap (no ordained priest among the travelers), the detail that motivates the later debate over self-ordination.'
      - id: more-utopia#u21-c3
        heading: 'The zealot''s banishment and the law of toleration'
        start_quote: 'Those among them that have not received our religion do not fright any'
        end_quote: 'no man ought to be punished for his religion.'
        why: 'The one concrete case of religious punishment in Utopia, used to establish that the law targets sedition, not belief — the chapter''s core legal distinction.'
      - id: more-utopia#u21-c4
        heading: 'Utopus''s rationale for toleration'
        start_quote: 'This law was made by Utopus, not only for preserving the public peace'
        end_quote: 'attended to with a gentle and unprejudiced mind'
        why: 'The philosophical keystone of the chapter: toleration justified by both civil pragmatism and an argument that coerced belief degrades truth into superstition.'
      - id: more-utopia#u21-c5
        heading: 'Excluded from office, but never punished'
        start_quote: 'only he made a solemn and severe law against such as should so'
        end_quote: 'is abhorred by the Utopians'
        why: 'Defines the toleration law''s one hard exception (denial of providence and immortality) and the careful distinction between civic exclusion and punishment, since coerced profession would itself be fraud.'
      - id: more-utopia#u21-c6
        heading: 'Funeral rites and the presence of the dead'
        start_quote: 'When they come from the funeral, they discourse of his good life'
        end_quote: 'prevents their engaging in ill designs.'
        why: 'Shows the belief in ancestors'' abiding presence functioning as real, unenforced moral technology — the chapter''s closing move from law to lived practice.'
  - nn: 22
    unit_id: book2-08-religions-02-priests
    note_id: more-utopia-book2-08-religions-02-priests
    span: 211092:219893
    chunks:
      - id: more-utopia#u22-c1
        heading: 'The two sects of religious devotion'
        start_quote: 'Of these there are two sorts: some live unmarried and chaste, and'
        end_quote: 'but they esteem the others as the most holy.'
        why: 'Establishes Utopia''s refusal to mandate one religious path, ranking devotion by sincerity of motive rather than by the practice chosen.'
      - id: more-utopia#u22-c2
        heading: 'Election and structure of the priesthood'
        start_quote: 'Their priests are men of eminent piety, and therefore they are but few'
        end_quote: 'consecrated by the college of priests.'
        why: 'Shows the priesthood is deliberately small, chosen by secret popular suffrage, and rotated through wartime service rather than hereditary or self-perpetuating.'
      - id: more-utopia#u22-c3
        heading: 'Exhortation, not punishment'
        start_quote: 'The care of all sacred things, the worship of God, and'
        end_quote: 'they are seized on by the Senate, and punished for their impiety.'
        why: 'Draws the load-bearing line between the priests'' moral authority (exhortation, excommunication) and the state''s coercive power, which the priesthood never wields directly.'
      - id: more-utopia#u22-c4
        heading: 'Civil immunity without coercive force'
        start_quote: 'None of the magistrates have greater honour paid them than is paid the'
        end_quote: 'great consequence to the public can proceed from the indemnity that the priests enjoy.'
        why: 'The unit''s central political argument: sacred immunity from state punishment is safe only because the office holds no coercive apparatus of its own, an explicit capture-resistance design.'
      - id: more-utopia#u22-c5
        heading: 'Priests as battlefield mediators'
        start_quote: 'When the Utopians engage in battle, the priests who accompany them to'
        end_quote: 'as not to look upon their persons as sacred and inviolable.'
        why: 'Demonstrates the practical, cross-national effect of priestly sanctity: a reverence strong enough to halt routs and broker peace among hostile nations.'
  - nn: 23
    unit_id: book2-08-religions-03-worship
    note_id: more-utopia-book2-08-religions-03-worship
    span: 219893:227612
    chunks:
      - id: more-utopia#u23-c1
        heading: 'Dim temples by design, not error'
        start_quote: 'They have magnificent temples, that are not only nobly built, but'
        end_quote: 'both recollects the mind and raises devotion.'
        why: 'States directly that the temples'' darkness is deliberate psychological engineering, not an architectural flaw — the unit''s clearest statement of sacred space as a designed technology of attention.'
      - id: more-utopia#u23-c2
        heading: 'One Divine Essence, many private sects, no images'
        start_quote: 'Though there are many different forms of religion among them, yet all these, how'
        end_quote: 'every one of them may use without prejudice to his own opinion.'
        why: 'The unit''s doctrinal core: how public worship absorbs religious plurality without contradicting any sect, via imagelessness, a shared name (Mithras), and doctrinally neutral prayers.'
      - id: more-utopia#u23-c3
        heading: 'Confession before communion'
        start_quote: 'In the festival which concludes the period, before they go to the temple, both'
        end_quote: 'cleansing their hearts, and reconciling all their differences.'
        why: 'Shows that entering worship is gated behind mandatory family confession and reconciliation, treating undisturbed domestic relations as a precondition for legitimate devotion.'
      - id: more-utopia#u23-c4
        heading: 'Seating that makes household virtue visible'
        start_quote: 'In the temples the two sexes are separated, the men'
        end_quote: 'greatest and almost the only incitement to virtue.'
        why: 'The clearest legibility moment in the unit: temple seating is arranged explicitly so parents can observe children''s public conduct, rendering domestic moral order visible and governable.'
      - id: more-utopia#u23-c5
        heading: 'Music engineered to work on the passions'
        start_quote: 'Yet in one thing they very much exceed us: all their music, both'
        end_quote: 'deep into the hearts of the hearers.'
        why: 'Names sacred music as a deliberate affective technology, matched precisely to each hymn''s mood, paralleling the unit''s treatment of incense and light as instruments rather than mere ornament.'
      - id: more-utopia#u23-c6
        heading: 'The prayer''s conditional humility'
        start_quote: 'In these they acknowledge God to be the author and governor'
        end_quote: 'He is pleased with a variety of religions.'
        why: 'Captures the unit''s central tension between hoped-for religious and political convergence and an explicit, vowed willingness to be shown wrong — the passage most directly about toleration''s limits.'
  - nn: 24
    unit_id: book2-08-religions-04-conclusion
    note_id: more-utopia-book2-08-religions-04-conclusion
    span: 227612:237343
    chunks:
      - id: more-utopia#u24-c1
        heading: 'The best commonwealth''s governing thesis'
        start_quote: 'Thus have I described to you, as particularly as I could, the Constitution of that'
        end_quote: 'than there is, elsewhere, of these that continue still employed.'
        why: 'States the unit''s governing thesis: security from want, guaranteed by common ownership, is what makes Utopians serve the public good instead of only themselves.'
      - id: more-utopia#u24-c2
        heading: 'Idle wealth versus essential labor'
        start_quote: 'I would gladly hear any man compare the justice that is'
        end_quote: 'there is no overplus left to lay up for old age.'
        why: 'Delivers the class-inversion indictment — idle wealth versus essential, unrewarded labor — that grounds the conspiracy-of-the-rich argument that follows.'
      - id: more-utopia#u24-c3
        heading: '"A conspiracy of the rich"'
        start_quote: 'Therefore I must say that, as I hope for mercy, I can'
        end_quote: 'are far from that happiness that is enjoyed among the Utopians;'
        why: 'The unit''s most quoted line, naming ordinary government as a conspiracy of the rich who convert private greed into public law.'
      - id: more-utopia#u24-c4
        heading: 'The granary parable'
        start_quote: 'Consider any year, that has been so unfruitful that many thousands'
        end_quote: 'was not really the only thing that obstructed their being procured!'
        why: 'Hythloday''s concrete empirical case that scarcity in a famine year is caused by hoarding and money, not by nature.'
      - id: more-utopia#u24-c5
        heading: 'Pride as the true obstacle'
        start_quote: 'I do not doubt but rich men are sensible of this, and'
        end_quote: 'possesses them too much to be easily drawn out;'
        why: 'Diagnoses pride, not self-interest or ignorance, as the deep psychological obstacle blocking adoption of Utopian equality.'
      - id: more-utopia#u24-c6
        heading: 'The narrator''s ambivalent close'
        start_quote: 'When Raphael had thus made an end of speaking, though many things'
        end_quote: 'that I rather wish, than hope, to see followed in our governments.'
        why: 'The book''s frame-breaking close, where the narrator withholds full assent from Hythloday''s speech and supplies Utopia''s famous ambivalent final line.'
