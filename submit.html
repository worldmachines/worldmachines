<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit — World Machines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit">World Machines</a></h1>
    <p class="tagline">Psychohistorical models</p>
  </header>

  <nav class="sitenav">
    <a href="/theory">Theory</a>
    <a href="/contributions">Contributions</a>
    <a href="/resources">Resources</a>
    <a href="/contributors">Contributors</a>
    <a href="/oracle">Oracle</a>
  </nav>

  <div class="form-wrap">
    <h2>Submit an article</h2>
    <p class="form-intro">Share a link to a contribution or resource relevant to world machines theory. Submissions are reviewed before publication.</p>

    <form id="submit-form" novalidate>
      <div class="field">
        <label for="url">URL <span class="required">*</span></label>
        <input type="url" id="url" name="url" placeholder="https://" required>
      </div>

      <div class="field">
        <label for="type">Authorship <span class="required">*</span></label>
        <div class="select-wrap">
          <select id="type" name="type" required>
            <option value="" disabled selected>Select authorship</option>
            <option value="contribution">Contribution — your own work</option>
            <option value="resource">Resource — third-party work</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="format">Format <span class="required">*</span></label>
        <div class="select-wrap">
          <select id="format" name="format" required>
            <option value="" disabled selected>Select format</option>
            <option value="essay">Essay</option>
            <option value="short story">Short story</option>
            <option value="paper">Paper</option>
            <option value="book">Book</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="description">Description <span class="optional">(optional)</span></label>
        <textarea id="description" name="description" placeholder="Brief note on why this is relevant…"></textarea>
      </div>

      <button type="submit" id="submit-btn">Submit</button>
      <div class="form-message" id="form-message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('submit-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('form-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'form-message';
      msg.textContent = '';

      const url = form.url.value.trim();
      const type = form.type.value;
      const format = form.format.value;

      if (!url || !type || !format) {
        msg.className = 'form-message error';
        msg.textContent = 'Please fill in all required fields.';
        return;
      }
      try { new URL(url); } catch {
        msg.className = 'form-message error';
        msg.textContent = 'Please enter a valid URL.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Submitting…';

      try {
        const body = new FormData(form);
        const res = await fetch('/api/submit', { method: 'POST', body });
        const data = await res.json();
        if (res.ok) {
          msg.className = 'form-message success';
          msg.textContent = 'Submitted — it will appear on the site within a few minutes.';
          form.reset();
        } else {
          throw new Error(data.error || 'Submission failed.');
        }
      } catch (err) {
        msg.className = 'form-message error';
        msg.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    });
  </script>
</body>
</html>
