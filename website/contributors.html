<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contributors — World Machines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit">World Machines</a></h1>
    <a href="/submit" class="submit-link">Submit</a>
  </header>
  <nav class="sitenav">
    <a href="/theory">Theory</a>
    <a href="/contributions">Contributions</a>
    <a href="/resources">Resources</a>
    <a href="/contributors">Contributors</a>
    <a href="/oracle">Oracle</a>
    <a href="https://worldmachines.zulipchat.com">Project Chat</a>
  </nav>
  <main>
    <section class="blurb">
      <p>The people building the World Machines project.</p>
    </section>
    <ul class="contributors-list" id="contributors-list">
      <li style="color:var(--muted);font-style:italic;list-style:none">Loading…</li>
    </ul>
  </main>

  <script>
    fetch('/api/contributors')
      .then(r => r.json())
      .then(({ contributors }) => {
        const list = document.getElementById('contributors-list');
        if (!contributors.length) {
          list.innerHTML = '<li style="color:var(--muted);font-style:italic;list-style:none">No contributors yet.</li>';
          return;
        }
        list.innerHTML = contributors.map(c => {
          const display = esc(c.name || c.handle);
          const urlHtml = c.url
            ? `<a href="${esc(c.url)}" class="contributor-site">${esc(c.url.replace(/^https?:\/\//, '').replace(/\/$/, ''))}</a>`
            : '';
          const bioHtml = c.bio ? `<span class="contributor-bio">${esc(c.bio)}</span>` : '';
          return `<li class="contributor">
            <span class="contributor-name">${display}</span>
            <span class="contributor-handle">@${esc(c.handle)}</span>
            ${urlHtml}
            ${bioHtml}
          </li>`;
        }).join('\n');
      });

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
