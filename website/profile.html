<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — World Machines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit">World Machines</a></h1>
    <a href="/submit" class="submit-link">Submit</a>
  </header>

  <nav class="sitenav">
    <a href="/theory">Theory</a>
    <a href="/contributions">Contributions</a>
    <a href="/resources">Resources</a>
    <a href="/contributors">Contributors</a>
    <a href="/oracle">Oracle</a>
  </nav>

  <div class="form-wrap">
    <h2>Your profile</h2>
    <p class="form-intro">Update your display name, site URL, and bio. Handle and email are set by the admin.</p>

    <form id="profile-form" novalidate>
      <div class="field">
        <label>Email <span class="optional">(read-only)</span></label>
        <input type="email" id="p-email" readonly>
      </div>
      <div class="field">
        <label>Handle <span class="optional">(read-only)</span></label>
        <input type="text" id="p-handle" readonly>
      </div>
      <div class="field">
        <label for="p-name">Full name</label>
        <input type="text" id="p-name" placeholder="First Last or preferred name">
      </div>
      <div class="field">
        <label for="p-url">Site URL</label>
        <input type="url" id="p-url" placeholder="https://your.site">
      </div>
      <div class="field">
        <label for="p-bio">Bio <span class="optional">(shown on contributors page)</span></label>
        <input type="text" id="p-bio" placeholder="your.site or a brief description">
      </div>
      <p class="form-note">Contact admin (vgr) to update email or handle.</p>
      <button type="submit" id="save-btn">Save</button>
      <div class="form-message" id="form-message"></div>
    </form>
  </div>

  <script>
    const msg = document.getElementById('form-message');

    fetch('/api/profile')
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          msg.className = 'form-message error';
          msg.textContent = data.error;
          return;
        }
        document.getElementById('p-email').value  = data.email  || '';
        document.getElementById('p-handle').value = data.handle || '';
        document.getElementById('p-name').value   = data.name   || '';
        document.getElementById('p-url').value    = data.url    || '';
        document.getElementById('p-bio').value    = data.bio    || '';
      })
      .catch(() => {
        msg.className = 'form-message error';
        msg.textContent = 'Could not load profile.';
      });

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('p-name').value.trim(),
            url:  document.getElementById('p-url').value.trim(),
            bio:  document.getElementById('p-bio').value.trim(),
          }),
        });
        const data = await res.json();
        if (res.ok) {
          msg.className = 'form-message success';
          msg.textContent = 'Profile saved.';
        } else {
          msg.className = 'form-message error';
          msg.textContent = data.error || 'Save failed.';
        }
      } catch {
        msg.className = 'form-message error';
        msg.textContent = 'Network error.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save';
      }
    });
  </script>
</body>
</html>
