name: Ingest Article Submission

on:
  repository_dispatch:
    types: [article-submission]

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest article
        env:
          SUBMISSION_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python scripts/ingest.py

      - name: Build site
        run: python scripts/build.py

      - name: Commit and push
        run: |
          git config user.name  "worldmachines-bot"
          git config user.email "bot@worldmachines.org"
          git add content/articles/ index.html
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Add: ${{ github.event.client_payload.url }}"
          git push

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name worldmachines --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
