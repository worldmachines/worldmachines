name: Rebuild site

# Triggered when source markdown files that feed build.py are updated.
# Rebuilds the generated HTML pages, commits them, and deploys to Cloudflare Pages.
# Article content changes are handled separately by ingest.yml.

on:
  push:
    branches: [main]
    paths:
      - 'website/blurbs.md'
      - 'website/devlog.md'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r website/requirements.txt

      - name: Rebuild site
        working-directory: website
        run: python scripts/build.py

      - name: Commit rebuilt HTML
        run: |
          git config user.name  "worldmachines-bot"
          git config user.email "bot@worldmachines.org"
          git add website/index.html website/contributions.html website/resources.html website/devlog.html
          git diff --staged --quiet && echo "Nothing to rebuild." && exit 0
          git commit -m "[trivial] Rebuild site from source changes"
          git push

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        working-directory: website
        run: wrangler pages deploy . --project-name worldmachines --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
